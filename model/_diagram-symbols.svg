<svg xmlns="http://www.w3.org/2000/svg"
     xmlns:sysml="urn:sysml-md:1.0"
     id="sysml-symbol-library"
     style="display:none"
     width="0"
     height="0">
  <defs>

    <!-- Section 1: CSS Styles -->
    <style>
      /* Element kind fills and strokes */
      .PartDef        { stroke: #3a3a4a; fill: #f5f5fa; stroke-width: 1.5; }
      .ItemDef        { stroke: #1e6b2e; fill: #f0faf2; stroke-width: 1.5; }
      .PortDef        { stroke: #1a4a80; fill: #e8f2ff; stroke-width: 1.5; }
      .ConnectionDef  { stroke: #5a2e8a; fill: #f7f0ff; stroke-width: 1.5; }
      .InterfaceDef   { stroke: #5a2e8a; fill: #f7f0ff; stroke-width: 1.5; }
      .ActionDef      { stroke: #7a4000; fill: #fff8f0; stroke-width: 1.5; }
      .CalculationDef { stroke: #7a4000; fill: #fff8f0; stroke-width: 1.5; }
      .ConstraintDef  { stroke: #6e1a1a; fill: #fff5f5; stroke-width: 1.5; }
      .RequirementDef { stroke: #4a0a6e; fill: #f9f7ff; stroke-width: 1.5; }
      .StateDef       { stroke: #225500; fill: #f5fff5; stroke-width: 1.5; }
      .AllocationDef  { stroke: #4a3a00; fill: #fffce8; stroke-width: 1.5; }
      .ViewDef        { stroke: #2a2a6e; fill: #f8f8ff; stroke-width: 1.5; }
      .MetadataDef    { stroke: #888;    fill: #f8f8f8; stroke-width: 1; }

      /* Role classes */
      .block      { rx: 4; font-family: sans-serif; }
      .boundary   { stroke: #4a6a9a; stroke-width: 1.5; stroke-dasharray: 8 4; fill: rgba(230,240,255,0.4); }
      .compartment { font-size: 9px; }
      .swimlane   { fill: rgba(245,245,250,0.6); stroke: #bbb; stroke-width: 1; }
      .system-boundary { stroke: #336; stroke-width: 1.5; fill: rgba(245,248,255,0.3); }
      .note       { fill: #fffde7; stroke: #aaa; stroke-width: 1; }
      .fragment   { fill: rgba(255,255,240,0.5); stroke: #8a8; stroke-width: 1; }
      .fragment-header { fill: #ddeedd; }
      .activation { fill: #c8d8f8; stroke: #336; stroke-width: 1; }
      .lifeline   { fill: #e8f0fe; stroke: #445; stroke-width: 1.5; }

      /* Port direction */
      .port        { fill: #d0e8ff; stroke: #336; stroke-width: 1.5; }
      .port.in     { fill: #cceebb; stroke: #264; }
      .port.out    { fill: #ffddcc; stroke: #642; }
      .port.inout  { fill: #eeeecc; stroke: #554; }

      /* Pseudostates */
      .initial     { fill: #222; stroke: none; }
      .final-outer { fill: white; stroke: #222; stroke-width: 2; }
      .final-inner { fill: #222; stroke: none; }
      .choice      { fill: white; stroke: #555; stroke-width: 1.5; }
      .history     { fill: white; stroke: #555; stroke-width: 1.5; }
      .state       { fill: #f5fff5; stroke: #225500; stroke-width: 1.5; }

      /* Modifier classes */
      .abstract  { stroke-dasharray: 5 3; }
      .variation { stroke-dasharray: 2 2; stroke-width: 2; }
      .variant   { opacity: 0.85; }

      /* Edge classes */
      .edge               { fill: none; stroke: #444; stroke-width: 1.5; }
      .edge.connection    { fill: none; stroke: #444; }
      .edge.flow          { fill: none; stroke: #4a90d9; stroke-width: 2; }
      .edge.inheritance   { fill: none; stroke: #333; }
      .edge.association   { fill: none; stroke: #444; stroke-width: 1; }
      .edge.composition   { fill: none; stroke: #333; }
      .edge.aggregation   { fill: none; stroke: #333; }
      .edge.dependency    { fill: none; stroke: #666; stroke-width: 1; stroke-dasharray: 6 3; }
      .edge.binding       { fill: none; stroke: #555; stroke-width: 1; stroke-dasharray: 4 4; }
      .edge.succession    { fill: none; stroke: #7a4000; stroke-width: 1.5; stroke-dasharray: 6 3; }
      .edge.transition    { fill: none; stroke: #225500; stroke-width: 1.5; }
      .edge.allocation    { fill: none; stroke: #4a3a00; stroke-width: 1.5; stroke-dasharray: 8 4; }
      .edge.derive        { fill: none; stroke: #4a0a6e; stroke-width: 1; stroke-dasharray: 6 3; }
      .edge.satisfy       { fill: none; stroke: #1e6b2e; stroke-width: 1; stroke-dasharray: 6 3; }
      .edge.verify        { fill: none; stroke: #0a4a6e; stroke-width: 1; stroke-dasharray: 6 3; }
      .edge.refine        { fill: none; stroke: #555; stroke-width: 1; stroke-dasharray: 6 3; }
      .edge.trace         { fill: none; stroke: #888; stroke-width: 1; stroke-dasharray: 6 3; }
      .edge.include       { fill: none; stroke: #555; stroke-width: 1; stroke-dasharray: 6 3; }
      .edge.extend        { fill: none; stroke: #555; stroke-width: 1; stroke-dasharray: 6 3; }
      .edge.generalization  { fill: none; stroke: #333; stroke-width: 1.5; }
      .edge.message-sync    { fill: none; stroke: #333; stroke-width: 1.5; }
      .edge.message-async   { fill: none; stroke: #333; stroke-width: 1.5; stroke-dasharray: 4 2; }
      .edge.return          { fill: none; stroke: #666; stroke-width: 1; stroke-dasharray: 6 3; }
      .edge.containment     { fill: none; stroke: #333; stroke-width: 1; }

      /* Label classes */
      .label            { font-size: 11px; font-weight: bold; fill: #222; text-anchor: middle; dominant-baseline: middle; }
      .stereotype       { font-size: 8px; font-style: italic; fill: #555; text-anchor: middle; }
      .edge-label       { font-size: 9px; font-style: italic; fill: #444; text-anchor: middle; }
      .compartment-label { font-size: 9px; fill: #333; text-anchor: start; }
      .swimlane-label   { font-size: 12px; font-weight: bold; fill: #555; text-anchor: middle; }
      .actor-label      { font-size: 10px; fill: #333; text-anchor: middle; }
    </style>

    <!-- Section 2: Markers -->

    <!-- #arrow-open: open arrowhead for general directed edges -->
    <marker id="arrow-open"
            markerWidth="10" markerHeight="8"
            refX="9" refY="4"
            orient="auto">
      <polyline points="1,1 9,4 1,7" fill="none" stroke="context-stroke" stroke-width="1.5"/>
    </marker>

    <!-- #arrow-filled: filled arrowhead for navigable associations / messages -->
    <marker id="arrow-filled"
            markerWidth="10" markerHeight="8"
            refX="9" refY="4"
            orient="auto">
      <polygon points="0,0 9,4 0,8" fill="context-stroke"/>
    </marker>

    <!-- #arrow-inherit: open triangle for generalization / inheritance -->
    <marker id="arrow-inherit"
            markerWidth="14" markerHeight="12"
            refX="13" refY="6"
            orient="auto">
      <polygon points="1,1 13,6 1,11" fill="white" stroke="context-stroke" stroke-width="1.5"/>
    </marker>

    <!-- #arrow-composition: filled diamond for composition -->
    <marker id="arrow-composition"
            markerWidth="14" markerHeight="10"
            refX="1" refY="5"
            orient="auto-start-reverse">
      <polygon points="1,5 7,1 13,5 7,9" fill="context-stroke"/>
    </marker>

    <!-- #arrow-aggregation: hollow diamond for aggregation -->
    <marker id="arrow-aggregation"
            markerWidth="14" markerHeight="10"
            refX="1" refY="5"
            orient="auto-start-reverse">
      <polygon points="1,5 7,1 13,5 7,9" fill="white" stroke="context-stroke" stroke-width="1.5"/>
    </marker>

    <!-- #arrow-flow: filled blue arrowhead for item flow / streaming -->
    <marker id="arrow-flow"
            markerWidth="10" markerHeight="8"
            refX="9" refY="4"
            orient="auto">
      <polygon points="0,0 9,4 0,8" fill="#4a90d9"/>
    </marker>

    <!-- #arrow-circle: circle terminus for interface / provided notation -->
    <marker id="arrow-circle"
            markerWidth="8" markerHeight="8"
            refX="4" refY="4"
            orient="auto">
      <circle cx="4" cy="4" r="3.5" fill="white" stroke="context-stroke" stroke-width="1.5"/>
    </marker>

    <!-- #arrow-cross: cross terminus for required interface notation -->
    <marker id="arrow-cross"
            markerWidth="10" markerHeight="10"
            refX="5" refY="5"
            orient="auto">
      <line x1="1" y1="1" x2="9" y2="9" stroke="context-stroke" stroke-width="2"/>
      <line x1="9" y1="1" x2="1" y2="9" stroke="context-stroke" stroke-width="2"/>
    </marker>

    <!-- Section 3: Note symbol -->

    <!-- #sym-note: dog-eared rectangle used for annotations and comments -->
    <symbol id="sym-note" viewBox="0 0 140 80">
      <path d="M 0,0 H 120 L 140,20 V 80 H 0 Z" fill="#fffde7" stroke="#888" stroke-width="1"/>
      <polygon points="120,0 140,20 120,20" fill="#eee" stroke="#888" stroke-width="1"/>
    </symbol>

    <!-- Section 4: Structural symbols -->

    <!-- #sym-PartDef: SysML part definition block with compartment divider and tab notch -->
    <symbol id="sym-PartDef" viewBox="0 0 160 80">
      <rect width="160" height="80" class="PartDef block"/>
      <line x1="0" y1="24" x2="160" y2="24" stroke="#3a3a4a" stroke-width="1"/>
      <rect x="0" y="0" width="10" height="6" fill="#3a3a4a"/>
      <text x="80" y="14" class="stereotype">«part def»</text>
    </symbol>

    <!-- #sym-ItemDef: SysML item definition block -->
    <symbol id="sym-ItemDef" viewBox="0 0 160 80">
      <rect width="160" height="80" class="ItemDef block"/>
      <line x1="0" y1="24" x2="160" y2="24" stroke="#1e6b2e" stroke-width="1"/>
      <rect x="0" y="0" width="10" height="6" fill="#1e6b2e"/>
      <text x="80" y="14" class="stereotype">«item def»</text>
    </symbol>

    <!-- #sym-ActionDef: SysML action definition block with rounded corners -->
    <symbol id="sym-ActionDef" viewBox="0 0 160 80">
      <rect width="160" height="80" rx="16" class="ActionDef block"/>
      <line x1="0" y1="24" x2="160" y2="24" stroke="#7a4000" stroke-width="1"/>
      <text x="80" y="14" class="stereotype">«action def»</text>
    </symbol>

    <!-- #sym-ConstraintDef: SysML constraint definition block with brace decorators -->
    <symbol id="sym-ConstraintDef" viewBox="0 0 160 80">
      <rect width="160" height="80" class="ConstraintDef block"/>
      <text x="2" y="40" font-size="24" fill="#6e1a1a">{</text>
      <text x="148" y="40" font-size="24" fill="#6e1a1a" text-anchor="end">}</text>
      <text x="80" y="14" class="stereotype">«constraint def»</text>
    </symbol>

    <!-- #sym-RequirementDef: SysML requirement definition block with id and text compartments -->
    <symbol id="sym-RequirementDef" viewBox="0 0 180 100">
      <rect width="180" height="100" class="RequirementDef block"/>
      <line x1="0" y1="20" x2="180" y2="20" stroke="#4a0a6e" stroke-width="1"/>
      <line x1="0" y1="60" x2="180" y2="60" stroke="#4a0a6e" stroke-width="1"/>
      <text x="90" y="13" class="stereotype">«requirement def»</text>
    </symbol>

    <!-- #sym-InterfaceDef: SysML interface definition block -->
    <symbol id="sym-InterfaceDef" viewBox="0 0 160 80">
      <rect width="160" height="80" class="InterfaceDef block"/>
      <line x1="0" y1="24" x2="160" y2="24" stroke="#5a2e8a" stroke-width="1"/>
      <text x="80" y="14" class="stereotype">«interface def»</text>
    </symbol>

    <!-- #sym-PortDef: SysML port definition block (small square) -->
    <symbol id="sym-PortDef" viewBox="0 0 60 60">
      <rect width="60" height="60" class="PortDef block"/>
      <text x="30" y="14" class="stereotype">«port def»</text>
    </symbol>

    <!-- #sym-ConnectionDef: SysML connection definition block -->
    <symbol id="sym-ConnectionDef" viewBox="0 0 160 80">
      <rect width="160" height="80" class="ConnectionDef block"/>
      <line x1="0" y1="24" x2="160" y2="24" stroke="#5a2e8a" stroke-width="1"/>
      <text x="80" y="14" class="stereotype">«connection def»</text>
    </symbol>

    <!-- #sym-boundary: IBD system boundary / context frame -->
    <symbol id="sym-boundary" viewBox="0 0 300 200">
      <rect width="300" height="200" rx="8" class="boundary"/>
      <text x="150" y="18" class="stereotype" fill="#4a6a9a">«block»</text>
    </symbol>

    <!-- #sym-port: small inline port square attached to block border -->
    <symbol id="sym-port" viewBox="0 0 14 14">
      <rect width="14" height="14" class="port"/>
    </symbol>

    <!-- Section 5: State machine symbols -->

    <!-- #sym-state: state node with name compartment and internal region divider -->
    <symbol id="sym-state" viewBox="0 0 140 60">
      <rect width="140" height="60" rx="12" class="state"/>
      <line x1="0" y1="24" x2="140" y2="24" stroke="#225500" stroke-width="1"/>
    </symbol>

    <!-- #sym-initial: filled circle initial pseudostate -->
    <symbol id="sym-initial" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="10" class="initial"/>
    </symbol>

    <!-- #sym-final: bullseye final state symbol -->
    <symbol id="sym-final" viewBox="0 0 28 28">
      <circle cx="14" cy="14" r="12" class="final-outer"/>
      <circle cx="14" cy="14" r="7" class="final-inner"/>
    </symbol>

    <!-- #sym-choice: diamond choice pseudostate -->
    <symbol id="sym-choice" viewBox="0 0 32 32">
      <polygon points="16,2 30,16 16,30 2,16" class="choice"/>
    </symbol>

    <!-- #sym-history: shallow history pseudostate (circle with H) -->
    <symbol id="sym-history" viewBox="0 0 28 28">
      <circle cx="14" cy="14" r="12" class="history"/>
      <text x="14" y="19" class="label" font-size="12" font-weight="bold">H</text>
    </symbol>

    <!-- Section 6: Requirement symbols -->

    <!-- #sym-requirement: requirement block with id, text and derived compartments -->
    <symbol id="sym-requirement" viewBox="0 0 180 100">
      <rect width="180" height="100" class="RequirementDef"/>
      <line x1="0" y1="20" x2="180" y2="20" stroke="#4a0a6e" stroke-width="1"/>
      <line x1="0" y1="52" x2="180" y2="52" stroke="#4a0a6e" stroke-width="1"/>
      <text x="90" y="13" class="stereotype">«requirement»</text>
    </symbol>

    <!-- #sym-testcase: test case block used in verification diagrams -->
    <symbol id="sym-testcase" viewBox="0 0 160 80">
      <rect width="160" height="80" fill="#f5fff7" stroke="#555" stroke-width="1.5" class="block"/>
      <line x1="0" y1="24" x2="160" y2="24" stroke="#555" stroke-width="1"/>
      <text x="80" y="14" class="stereotype">«test case»</text>
    </symbol>

    <!-- Section 7: Sequence symbols -->

    <!-- #sym-lifeline: sequence diagram lifeline head with dashed stem -->
    <symbol id="sym-lifeline" viewBox="0 0 120 220">
      <rect width="120" height="32" rx="4" class="lifeline"/>
      <line x1="60" y1="32" x2="60" y2="220" stroke="#888" stroke-width="1" stroke-dasharray="4 4"/>
    </symbol>

    <!-- #sym-actor: stick figure actor for use-case and sequence diagrams -->
    <symbol id="sym-actor" viewBox="0 0 40 80">
      <circle cx="20" cy="10" r="8" fill="white" stroke="#333" stroke-width="1.5"/>
      <line x1="20" y1="18" x2="20" y2="45" stroke="#333" stroke-width="1.5"/>
      <line x1="5"  y1="30" x2="35" y2="30" stroke="#333" stroke-width="1.5"/>
      <line x1="20" y1="45" x2="8"  y2="68" stroke="#333" stroke-width="1.5"/>
      <line x1="20" y1="45" x2="32" y2="68" stroke="#333" stroke-width="1.5"/>
    </symbol>

    <!-- #sym-fragment: combined fragment frame with operator label box -->
    <symbol id="sym-fragment" viewBox="0 0 200 120">
      <rect width="200" height="120" class="fragment"/>
      <rect x="0" y="0" width="44" height="18" class="fragment-header"/>
      <line x1="44" y1="18" x2="44" y2="0" stroke="#888" stroke-width="1"/>
    </symbol>

    <!-- Section 8: Use-case symbols -->

    <!-- #sym-usecase: ellipse use-case shape -->
    <symbol id="sym-usecase" viewBox="0 0 160 70">
      <ellipse cx="80" cy="35" rx="76" ry="32" fill="white" stroke="#555" stroke-width="1.5"/>
    </symbol>

    <!-- #sym-system-boundary: system boundary rectangle for use-case diagrams -->
    <symbol id="sym-system-boundary" viewBox="0 0 400 300">
      <rect width="400" height="300" class="system-boundary"/>
    </symbol>

  </defs>
</svg>
