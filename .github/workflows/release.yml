name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            release_notes: true
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            use_cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build
        shell: bash
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --locked --package syscribe --target ${{ matrix.target }}
          else
            cargo build --release --locked --package syscribe --target ${{ matrix.target }}
          fi

      - name: Stage binary
        shell: bash
        run: |
          TARGET="${{ matrix.target }}"
          if [[ "$TARGET" == *"windows"* ]]; then
            cp "target/${TARGET}/release/syscribe.exe" "syscribe-${TARGET}.exe"
          else
            cp "target/${TARGET}/release/syscribe" "syscribe-${TARGET}"
          fi

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: syscribe-${{ matrix.target }}*
          generate_release_notes: ${{ matrix.release_notes == true }}
