name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            release_notes: true
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            use_cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build
        shell: bash
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --locked --package syscribe --target ${{ matrix.target }}
          else
            cargo build --release --locked --package syscribe --target ${{ matrix.target }}
          fi

      - name: Stage binary
        shell: bash
        run: |
          TARGET="${{ matrix.target }}"
          if [[ "$TARGET" == *"windows"* ]]; then
            cp "target/${TARGET}/release/syscribe.exe" "syscribe-${TARGET}.exe"
          else
            cp "target/${TARGET}/release/syscribe" "syscribe-${TARGET}"
          fi

      - name: Upload to release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          # Create the release once; idempotent under the 5-way matrix race
          # (a losing concurrent create just finds it already exists).
          if ! gh release view "$tag" >/dev/null 2>&1; then
            gh release create "$tag" --title "$tag" --generate-notes || true
          fi
          # Upload this target's asset with retry. The release API can flake under
          # concurrent matrix access — softprops/action-gh-release@v2 intermittently
          # reported "Requires authentication" on the Windows runner; gh + retry is
          # robust (and drops the deprecated Node20 action).
          for attempt in 1 2 3 4 5; do
            if gh release upload "$tag" syscribe-${{ matrix.target }}* --clobber; then
              echo "uploaded on attempt $attempt"; exit 0
            fi
            echo "upload attempt $attempt failed; retrying in $((attempt * 10))s"; sleep $((attempt * 10))
          done
          echo "upload failed after 5 attempts"; exit 1

  move-major-tag:
    name: Move major version tag
    # Only re-point the moving tag once every platform built and uploaded.
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Re-point v<major> to this release
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"                       # e.g. v0.26.10
          major="v$(printf '%s' "${tag#v}" | cut -d. -f1)"   # v0.26.10 -> v0
          echo "Moving ${major} -> ${GITHUB_SHA} (release ${tag})"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Annotated, force-moved. The 'v<major>' ref does not match the release
          # trigger ('v[0-9]+.[0-9]+.[0-9]+'), so this push cannot re-trigger Release.
          git tag -f -a "${major}" -m "Moving tag: latest ${major}.x release (currently ${tag})" "${GITHUB_SHA}"
          git push -f origin "${major}"
