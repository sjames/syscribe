<svg xmlns="http://www.w3.org/2000/svg" xmlns:sysml="urn:syscribe:1.0"
     width="640" height="280" viewBox="0 0 640 280">

  <!--
    IBD — UAV::Power::PowerSystem
    Parts: battery : BatteryPack, pdu : PowerDistributionUnit
    Ports: battery.powerOut, pdu.powerIn, pdu.powerOut, mainPowerOut (boundary)
    Connections:
      flow   — battery.powerOut ──▶ pdu.powerIn      (PowerConnectionDef)
      binding — pdu.powerOut    ══  mainPowerOut      (bindingConnection)
    Markers sourced from _diagram-symbols.svg at model root.
  -->

  <!-- ── Boundary ──────────────────────────────────────────── -->
  <g id="s-boundary" class="boundary" sysml:ref="UAV::Power::PowerSystem">
    <rect x="10" y="10" width="620" height="260"
          rx="6" fill="#FAFBFF" stroke="#444" stroke-width="1.5"/>
    <text x="22" y="29" font-size="9" font-family="sans-serif" fill="#666">«part def»</text>
    <text x="22" y="44" font-size="13" font-weight="bold" font-family="sans-serif">PowerSystem</text>
  </g>

  <!-- ── battery : BatteryPack ─────────────────────────────── -->
  <g id="s-battery" class="block Part" sysml:ref="UAV::Power::PowerSystem::battery">
    <rect x="50" y="90" width="155" height="90"
          fill="white" stroke="#444" stroke-width="1.5"/>
    <line x1="50" y1="115" x2="205" y2="115" stroke="#444" stroke-width="1"/>
    <text x="127" y="108" text-anchor="middle" font-size="9" font-family="sans-serif" fill="#666">«part»</text>
    <text x="127" y="134" text-anchor="middle" font-size="10" font-weight="bold" font-family="sans-serif">battery</text>
    <text x="127" y="148" text-anchor="middle" font-size="9" font-family="sans-serif" fill="#555">: BatteryPack</text>
    <text x="127" y="164" text-anchor="middle" font-size="8" font-family="monospace" fill="#777">22.2 V · 133.56 Wh</text>
  </g>

  <!-- powerOut port — right edge of battery -->
  <g id="s-battery-pout" class="port out" sysml:ref="UAV::Power::PowerSystem::battery::powerOut">
    <rect x="197" y="131" width="16" height="16"
          fill="#C8E6FF" stroke="#444" stroke-width="1"/>
    <text x="205" y="124" text-anchor="middle" font-size="7" font-family="sans-serif" fill="#444">powerOut</text>
  </g>

  <!-- ── pdu : PowerDistributionUnit ───────────────────────── -->
  <g id="s-pdu" class="block Part" sysml:ref="UAV::Power::PowerSystem::pdu">
    <rect x="345" y="90" width="185" height="90"
          fill="white" stroke="#444" stroke-width="1.5"/>
    <line x1="345" y1="115" x2="530" y2="115" stroke="#444" stroke-width="1"/>
    <text x="437" y="108" text-anchor="middle" font-size="9" font-family="sans-serif" fill="#666">«part»</text>
    <text x="437" y="134" text-anchor="middle" font-size="10" font-weight="bold" font-family="sans-serif">pdu</text>
    <text x="437" y="148" text-anchor="middle" font-size="9" font-family="sans-serif" fill="#555">: PowerDistributionUnit</text>
  </g>

  <!-- powerIn port — left edge of pdu -->
  <g id="s-pdu-pin" class="port in" sysml:ref="UAV::Power::PowerSystem::pdu::powerIn">
    <rect x="337" y="131" width="16" height="16"
          fill="#C8E6FF" stroke="#444" stroke-width="1"/>
    <text x="345" y="124" text-anchor="middle" font-size="7" font-family="sans-serif" fill="#444">powerIn</text>
  </g>

  <!-- powerOut port — right edge of pdu -->
  <g id="s-pdu-pout" class="port out" sysml:ref="UAV::Power::PowerSystem::pdu::powerOut">
    <rect x="522" y="131" width="16" height="16"
          fill="#C8E6FF" stroke="#444" stroke-width="1"/>
    <text x="530" y="124" text-anchor="middle" font-size="7" font-family="sans-serif" fill="#444">powerOut</text>
  </g>

  <!-- mainPowerOut port — right edge of boundary -->
  <g id="s-main-pout" class="port out" sysml:ref="UAV::Power::PowerSystem::mainPowerOut">
    <rect x="622" y="131" width="16" height="16"
          fill="#C8E6FF" stroke="#444" stroke-width="1"/>
    <text x="630" y="124" text-anchor="middle" font-size="7" font-family="sans-serif" fill="#444">mainPowerOut</text>
  </g>

  <!-- ── Flow: battery.powerOut ──▶ pdu.powerIn ────────────── -->
  <line id="e-batt-pdu" class="edge flow"
        sysml:ref="UAV::Power::PowerSystem"
        x1="213" y1="139" x2="337" y2="139"
        stroke="#3a6ea5" stroke-width="1.5"
        marker-end="url(#arrow-flow)"/>
  <text x="275" y="132" text-anchor="middle" font-size="8" font-family="sans-serif" fill="#3a6ea5">PowerConnectionDef</text>

  <!-- ── Binding: pdu.powerOut ══ mainPowerOut ─────────────── -->
  <line id="e-pdu-bind" class="edge binding"
        sysml:ref="UAV::Power::PowerSystem"
        x1="538" y1="139" x2="622" y2="139"
        stroke="#444" stroke-width="1.5"
        stroke-dasharray="4 4"/>
  <text x="580" y="132" text-anchor="middle" font-size="9" font-family="sans-serif" fill="#555">=</text>

</svg>
