<svg xmlns="http://www.w3.org/2000/svg" xmlns:sysml="urn:syscribe:1.0"
     width="640" height="360" viewBox="0 0 640 360">

  <defs>
    <marker id="arrow-flow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0,0 9,4 0,8" fill="#4a90d9"/>
    </marker>
  </defs>

  <!-- ── Boundary: AvionicsBay ──────────────────────────────── -->
  <g id="s-boundary" sysml:ref="UAV::Avionics::AvionicsBay">
    <rect x="20" y="20" width="600" height="320" rx="8"
          fill="rgba(230,240,255,0.4)" stroke="#4a6a9a"
          stroke-width="1.5" stroke-dasharray="8 4"/>
    <text x="32" y="37" font-size="8" font-family="sans-serif" fill="#4a6a9a">«part def»</text>
    <text x="32" y="52" font-size="12" font-weight="bold" font-family="sans-serif" fill="#333">AvionicsBay</text>
  </g>

  <!-- ── FlightController block ─────────────────────────────── -->
  <g id="s-fc" sysml:ref="UAV::Avionics::FlightController">
    <rect x="60" y="100" width="162" height="90" rx="4"
          fill="#f5f5fa" stroke="#3a3a4a" stroke-width="1.5"/>
    <rect x="60" y="100" width="10" height="6" fill="#3a3a4a"/>
    <line x1="60" y1="122" x2="222" y2="122" stroke="#3a3a4a" stroke-width="1"/>
    <text x="141" y="115" text-anchor="middle" font-size="8" font-family="sans-serif" fill="#555">«part»</text>
    <text x="141" y="142" text-anchor="middle" font-size="10" font-weight="bold" font-family="sans-serif">FlightController</text>
  </g>

  <!-- ── IMU block ─────────────────────────────────────────── -->
  <g id="s-imu" sysml:ref="UAV::Avionics::IMU">
    <rect x="358" y="78" width="122" height="66" rx="4"
          fill="#f5f5fa" stroke="#3a3a4a" stroke-width="1.5"/>
    <rect x="358" y="78" width="9" height="5" fill="#3a3a4a"/>
    <line x1="358" y1="96" x2="480" y2="96" stroke="#3a3a4a" stroke-width="1"/>
    <text x="419" y="90" text-anchor="middle" font-size="8" font-family="sans-serif" fill="#555">«part»</text>
    <text x="419" y="114" text-anchor="middle" font-size="10" font-weight="bold" font-family="sans-serif">IMU</text>
  </g>

  <!-- ── GPSReceiver block ──────────────────────────────────── -->
  <g id="s-gps" sysml:ref="UAV::Avionics::GPSReceiver">
    <rect x="358" y="218" width="142" height="66" rx="4"
          fill="#f5f5fa" stroke="#3a3a4a" stroke-width="1.5"/>
    <rect x="358" y="218" width="10" height="5" fill="#3a3a4a"/>
    <line x1="358" y1="236" x2="500" y2="236" stroke="#3a3a4a" stroke-width="1"/>
    <text x="429" y="230" text-anchor="middle" font-size="8" font-family="sans-serif" fill="#555">«part»</text>
    <text x="429" y="254" text-anchor="middle" font-size="10" font-weight="bold" font-family="sans-serif">GPSReceiver</text>
  </g>

  <!-- ── powerIn port (straddles left edge of FC) ───────────── -->
  <g id="s-fc-power" sysml:ref="UAV::Avionics::FlightController::powerIn">
    <rect x="52" y="176" width="16" height="16"
          fill="#d0e8ff" stroke="#336" stroke-width="1.5"/>
    <text x="60" y="205" text-anchor="middle" font-size="8" font-family="sans-serif">powerIn</text>
  </g>

  <!-- ── controlOut port (right edge of FC) ────────────────── -->
  <g id="s-fc-ctrl" sysml:ref="UAV::Avionics::FlightController::controlOut">
    <rect x="214" y="120" width="16" height="16"
          fill="#ffddcc" stroke="#642" stroke-width="1.5"/>
    <text x="252" y="131" font-size="8" font-family="sans-serif">controlOut</text>
  </g>

  <!-- ── telemetryOut port (right edge of FC) ──────────────── -->
  <g id="s-fc-telem" sysml:ref="UAV::Avionics::FlightController::telemetryOut">
    <rect x="214" y="155" width="16" height="16"
          fill="#ffddcc" stroke="#642" stroke-width="1.5"/>
    <text x="252" y="166" font-size="8" font-family="sans-serif">telemetryOut</text>
  </g>

  <!-- ── Flow: boundary power rail → powerIn ───────────────── -->
  <line id="e-power" sysml:ref="UAV::Avionics::AvionicsBay"
        x1="20" y1="184" x2="52" y2="184"
        stroke="#3a6ea5" stroke-width="1.5"
        marker-end="url(#arrow-flow)"/>

  <!-- ── Flow: controlOut → GPSReceiver left edge ──────────── -->
  <line id="e-ctrl" sysml:ref="UAV::Avionics::AvionicsBay"
        x1="230" y1="128" x2="358" y2="251"
        stroke="#3a6ea5" stroke-width="1.5" stroke-dasharray="5 3"
        marker-end="url(#arrow-flow)"/>

</svg>
