<svg xmlns="http://www.w3.org/2000/svg" xmlns:sysml="urn:syscribe:1.0"
     width="700" height="520" viewBox="0 0 700 520">

  <defs>
    <!-- Normal transition arrow -->
    <marker id="arrow-open" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polyline points="1,1 9,4 1,7" fill="none" stroke="#333" stroke-width="1.5"/>
    </marker>
    <!-- Recovery (gray dashed) arrow -->
    <marker id="arrow-recover" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polyline points="1,1 9,4 1,7" fill="none" stroke="#888" stroke-width="1.5"/>
    </marker>
    <!-- Fault transition arrow -->
    <marker id="arrow-fault" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polyline points="1,1 9,4 1,7" fill="none" stroke="#c0392b" stroke-width="1.5"/>
    </marker>
  </defs>

  <!-- ── Initial pseudostate ────────────────────────────────── -->
  <g id="s-initial" sysml:ref="Behavior::FlightStates">
    <circle cx="185" cy="30" r="10" fill="#222"/>
  </g>

  <!-- ── disarmed ──────────────────────────────────────────── -->
  <g id="s-disarmed" sysml:ref="Behavior::FlightStates::disarmed">
    <rect x="120" y="60" width="140" height="44" rx="10"
          fill="#f5fff5" stroke="#225500" stroke-width="1.5"/>
    <text x="190" y="87" text-anchor="middle" font-size="12" font-family="sans-serif">disarmed</text>
  </g>

  <!-- ── armed ─────────────────────────────────────────────── -->
  <g id="s-armed" sysml:ref="Behavior::FlightStates::armed">
    <rect x="120" y="150" width="140" height="44" rx="10"
          fill="#f5fff5" stroke="#225500" stroke-width="1.5"/>
    <text x="190" y="177" text-anchor="middle" font-size="12" font-family="sans-serif">armed</text>
  </g>

  <!-- ── takingOff ─────────────────────────────────────────── -->
  <g id="s-takingOff" sysml:ref="Behavior::FlightStates::takingOff">
    <rect x="120" y="240" width="140" height="44" rx="10"
          fill="#f5fff5" stroke="#225500" stroke-width="1.5"/>
    <text x="190" y="267" text-anchor="middle" font-size="12" font-family="sans-serif">takingOff</text>
  </g>

  <!-- ── flying ────────────────────────────────────────────── -->
  <g id="s-flying" sysml:ref="Behavior::FlightStates::flying">
    <rect x="120" y="330" width="140" height="44" rx="10"
          fill="#f5fff5" stroke="#225500" stroke-width="1.5"/>
    <text x="190" y="357" text-anchor="middle" font-size="12" font-family="sans-serif">flying</text>
  </g>

  <!-- ── landing ────────────────────────────────────────────── -->
  <g id="s-landing" sysml:ref="Behavior::FlightStates::landing">
    <rect x="120" y="420" width="140" height="44" rx="10"
          fill="#f5fff5" stroke="#225500" stroke-width="1.5"/>
    <text x="190" y="447" text-anchor="middle" font-size="12" font-family="sans-serif">landing</text>
  </g>

  <!-- ── fault (right column) ──────────────────────────────── -->
  <g id="s-fault" sysml:ref="Behavior::FlightStates::fault">
    <rect x="480" y="240" width="140" height="44" rx="10"
          fill="#fff5f5" stroke="#c0392b" stroke-width="1.5"/>
    <text x="550" y="267" text-anchor="middle" font-size="12" font-family="sans-serif" fill="#c0392b">fault</text>
  </g>

  <!-- ═══ TRANSITIONS ═══ -->

  <!-- initial → disarmed -->
  <line id="e-init"
        x1="185" y1="40" x2="185" y2="60"
        stroke="#333" stroke-width="1.5" marker-end="url(#arrow-open)"/>

  <!-- disarmed → armed -->
  <line id="e-arm"
        x1="190" y1="104" x2="190" y2="150"
        stroke="#333" stroke-width="1.5" marker-end="url(#arrow-open)"/>
  <text x="196" y="132" font-size="9" font-family="sans-serif" fill="#555">ControlCommand [disarmed]</text>

  <!-- armed → takingOff -->
  <line id="e-takeoff"
        x1="190" y1="194" x2="190" y2="240"
        stroke="#333" stroke-width="1.5" marker-end="url(#arrow-open)"/>
  <text x="196" y="222" font-size="9" font-family="sans-serif" fill="#555">ControlCommand [armed]</text>

  <!-- takingOff → flying -->
  <line id="e-fly"
        x1="190" y1="284" x2="190" y2="330"
        stroke="#333" stroke-width="1.5" marker-end="url(#arrow-open)"/>
  <text x="196" y="312" font-size="9" font-family="sans-serif" fill="#555">[altitude &gt;= target]</text>

  <!-- flying → landing -->
  <line id="e-land"
        x1="190" y1="374" x2="190" y2="420"
        stroke="#333" stroke-width="1.5" marker-end="url(#arrow-open)"/>
  <text x="196" y="402" font-size="9" font-family="sans-serif" fill="#555">ControlCommand [RTH]</text>

  <!-- landing → disarmed (curved back up the left side) -->
  <path id="e-disarm"
        d="M 120,442 Q 40,442 40,82 Q 40,82 120,82"
        fill="none" stroke="#333" stroke-width="1.5" marker-end="url(#arrow-open)"/>
  <text font-size="9" font-family="sans-serif" fill="#555"
        transform="translate(22,262) rotate(-90)">[altitude &lt;= 0.1]</text>

  <!-- fault → disarmed (recovery, curved top) -->
  <path id="e-recover"
        d="M 550,240 Q 550,100 260,82"
        fill="none" stroke="#888" stroke-width="1.5" stroke-dasharray="4 3"
        marker-end="url(#arrow-recover)"/>
  <text x="420" y="135" font-size="9" font-family="sans-serif" fill="#888">ControlCommand [cleared]</text>

  <!-- armed → fault -->
  <path id="e-armfault"
        d="M 260,172 Q 400,172 480,262"
        fill="none" stroke="#c0392b" stroke-width="1.5" marker-end="url(#arrow-fault)"/>
  <text x="358" y="193" font-size="9" font-family="sans-serif" fill="#c0392b">[imu.accel &gt; 30]</text>

  <!-- takingOff → fault -->
  <line id="e-tofault"
        x1="260" y1="262" x2="480" y2="262"
        stroke="#c0392b" stroke-width="1.5" marker-end="url(#arrow-fault)"/>
  <text x="320" y="255" font-size="9" font-family="sans-serif" fill="#c0392b">[altitude stall]</text>

  <!-- flying → fault -->
  <path id="e-flyfault"
        d="M 260,352 Q 400,352 480,280"
        fill="none" stroke="#c0392b" stroke-width="1.5" marker-end="url(#arrow-fault)"/>
  <text x="340" y="375" font-size="9" font-family="sans-serif" fill="#c0392b">[battery &lt; 10%]</text>

  <!-- landing → fault -->
  <path id="e-lndfault"
        d="M 260,442 Q 500,442 550,284"
        fill="none" stroke="#c0392b" stroke-width="1.5" marker-end="url(#arrow-fault)"/>
  <text x="440" y="458" font-size="9" font-family="sans-serif" fill="#c0392b">[descent rate &gt; 3m/s]</text>

</svg>
