<svg xmlns="http://www.w3.org/2000/svg" xmlns:sysml="urn:syscribe:1.0"
     width="780" height="468" viewBox="0 0 780 468">

  <!--
    Safety requirements traceability:
      RequirementDef SafetyReqs (root)
        ← derivedFrom ── FaultTolerantFCReq  ← verifies ── FCFaultInjectionTest
                                               → allocatedTo → FlightController
        ← derivedFrom ── SafeLandingReq      ← verifies ── SafeLandingTest
                                               → allocatedTo → UAVSystem
    Layout coordinates offset +30 from frontmatter (to clear x=-21 minimum).
  -->

  <defs>
    <!-- Open arrowhead for derivedFrom / verifies / allocatedTo -->
    <marker id="arrow-derive" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polyline points="1,1 9,4 1,7" fill="none" stroke="#4a0a6e" stroke-width="1.5"/>
    </marker>
    <marker id="arrow-verify" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polyline points="1,1 9,4 1,7" fill="none" stroke="#0a4a6e" stroke-width="1.5"/>
    </marker>
    <marker id="arrow-alloc" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polyline points="1,1 9,4 1,7" fill="none" stroke="#4a3a00" stroke-width="1.5"/>
    </marker>
  </defs>

  <!-- ── s-safety-root: RequirementDef SafetyReqs ─────────── -->
  <!-- layout: x=270+30=300, y=20+10=30, w=240, h=56           -->
  <g id="s-safety-root" sysml:ref="Requirements::SafetyReqs">
    <rect x="300" y="30" width="240" height="56" rx="4"
          fill="#f9f7ff" stroke="#4a0a6e" stroke-width="1.5"/>
    <line x1="300" y1="47" x2="540" y2="47" stroke="#4a0a6e" stroke-width="1"/>
    <text x="420" y="41" text-anchor="middle" font-size="8" font-family="sans-serif" fill="#4a0a6e">«requirement def»</text>
    <text x="420" y="64" text-anchor="middle" font-size="10" font-weight="bold" font-family="sans-serif">SafetyReqs</text>
    <text x="420" y="78" text-anchor="middle" font-size="8" font-family="sans-serif" fill="#666">REQ-UAV-SAFE-000</text>
  </g>

  <!-- ── s-fc-req: Requirement FaultTolerantFCReq ─────────── -->
  <!-- layout: x=131+30=161, y=140+10=150, w=240, h=70         -->
  <g id="s-fc-req" sysml:ref="Requirements::FaultTolerantFCReq">
    <rect x="161" y="150" width="240" height="70" rx="4"
          fill="#f9f7ff" stroke="#4a0a6e" stroke-width="1.5"/>
    <line x1="161" y1="167" x2="401" y2="167" stroke="#4a0a6e" stroke-width="1"/>
    <text x="281" y="161" text-anchor="middle" font-size="8" font-family="sans-serif" fill="#4a0a6e">«requirement»</text>
    <text x="281" y="183" text-anchor="middle" font-size="9" font-weight="bold" font-family="sans-serif">FaultTolerantFCReq</text>
    <text x="281" y="197" text-anchor="middle" font-size="8" font-family="sans-serif" fill="#666">REQ-UAV-FC-001</text>
    <text x="281" y="212" text-anchor="middle" font-size="7" font-family="sans-serif" fill="#888">sensor failure detect ≤ 50 ms</text>
  </g>

  <!-- ── s-land-req: Requirement SafeLandingReq ───────────── -->
  <!-- layout: x=495+30=525, y=115+10=125, w=240, h=70         -->
  <g id="s-land-req" sysml:ref="Requirements::SafeLandingReq">
    <rect x="525" y="125" width="240" height="70" rx="4"
          fill="#f9f7ff" stroke="#4a0a6e" stroke-width="1.5"/>
    <line x1="525" y1="142" x2="765" y2="142" stroke="#4a0a6e" stroke-width="1"/>
    <text x="645" y="136" text-anchor="middle" font-size="8" font-family="sans-serif" fill="#4a0a6e">«requirement»</text>
    <text x="645" y="158" text-anchor="middle" font-size="9" font-weight="bold" font-family="sans-serif">SafeLandingReq</text>
    <text x="645" y="172" text-anchor="middle" font-size="8" font-family="sans-serif" fill="#666">REQ-UAV-SAFE-001</text>
    <text x="645" y="187" text-anchor="middle" font-size="7" font-family="sans-serif" fill="#888">auto-land on battery-critical / link-loss</text>
  </g>

  <!-- ── s-fc-test: TestCase FCFaultInjectionTest ─────────── -->
  <!-- layout: x=-21+30=9, y=308+10=318, w=200, h=56           -->
  <g id="s-fc-test" sysml:ref="Verification::FCFaultInjectionTest">
    <rect x="9" y="318" width="200" height="56" rx="4"
          fill="#f5fff7" stroke="#2e7d32" stroke-width="1.5"/>
    <line x1="9" y1="335" x2="209" y2="335" stroke="#2e7d32" stroke-width="1"/>
    <text x="109" y="329" text-anchor="middle" font-size="8" font-family="sans-serif" fill="#2e7d32">«test case»</text>
    <text x="109" y="351" text-anchor="middle" font-size="9" font-weight="bold" font-family="sans-serif">FCFaultInjectionTest</text>
    <text x="109" y="366" text-anchor="middle" font-size="7" font-family="sans-serif" fill="#888">TC-FC-FAULT-001 · L4</text>
  </g>

  <!-- ── s-land-test: TestCase SafeLandingTest ────────────── -->
  <!-- layout: x=336+30=366, y=284+10=294, w=200, h=56         -->
  <g id="s-land-test" sysml:ref="Verification::SafeLandingTest">
    <rect x="366" y="294" width="200" height="56" rx="4"
          fill="#f5fff7" stroke="#2e7d32" stroke-width="1.5"/>
    <line x1="366" y1="311" x2="566" y2="311" stroke="#2e7d32" stroke-width="1"/>
    <text x="466" y="305" text-anchor="middle" font-size="8" font-family="sans-serif" fill="#2e7d32">«test case»</text>
    <text x="466" y="327" text-anchor="middle" font-size="9" font-weight="bold" font-family="sans-serif">SafeLandingTest</text>
    <text x="466" y="342" text-anchor="middle" font-size="7" font-family="sans-serif" fill="#888">TC-SAFE-LAND-001 · L4</text>
  </g>

  <!-- ── s-fc-hw: PartDef FlightController ────────────────── -->
  <!-- layout: x=280+30=310, y=390+10=400, w=160, h=46         -->
  <g id="s-fc-hw" sysml:ref="UAV::Avionics::FlightController">
    <rect x="310" y="400" width="160" height="46" rx="4"
          fill="#f5f5fa" stroke="#3a3a4a" stroke-width="1.5"/>
    <rect x="310" y="400" width="9" height="5" fill="#3a3a4a"/>
    <line x1="310" y1="415" x2="470" y2="415" stroke="#3a3a4a" stroke-width="1"/>
    <text x="390" y="409" text-anchor="middle" font-size="8" font-family="sans-serif" fill="#555">«part def»</text>
    <text x="390" y="432" text-anchor="middle" font-size="9" font-weight="bold" font-family="sans-serif">FlightController</text>
  </g>

  <!-- ── s-uav-sys: PartDef UAVSystem ─────────────────────── -->
  <!-- layout: x=557+30=587, y=384+10=394, w=160, h=46         -->
  <g id="s-uav-sys" sysml:ref="UAV::UAVSystem">
    <rect x="587" y="394" width="160" height="46" rx="4"
          fill="#f5f5fa" stroke="#3a3a4a" stroke-width="1.5"/>
    <rect x="587" y="394" width="9" height="5" fill="#3a3a4a"/>
    <line x1="587" y1="409" x2="747" y2="409" stroke="#3a3a4a" stroke-width="1"/>
    <text x="667" y="403" text-anchor="middle" font-size="8" font-family="sans-serif" fill="#555">«part def»</text>
    <text x="667" y="426" text-anchor="middle" font-size="9" font-weight="bold" font-family="sans-serif">UAVSystem</text>
  </g>

  <!-- ═══ EDGES ═══ -->

  <!-- e-fc-derive: FaultTolerantFCReq derivedFrom SafetyReqs -->
  <line id="e-fc-derive" sysml:ref="Requirements::FaultTolerantFCReq"
        x1="281" y1="150" x2="370" y2="86"
        stroke="#4a0a6e" stroke-width="1" stroke-dasharray="6 3"
        marker-end="url(#arrow-derive)"/>
  <text x="310" y="112" text-anchor="middle" font-size="7" font-family="sans-serif" fill="#4a0a6e">«derivedFrom»</text>

  <!-- e-land-derive: SafeLandingReq derivedFrom SafetyReqs -->
  <line id="e-land-derive" sysml:ref="Requirements::SafeLandingReq"
        x1="645" y1="125" x2="470" y2="86"
        stroke="#4a0a6e" stroke-width="1" stroke-dasharray="6 3"
        marker-end="url(#arrow-derive)"/>
  <text x="570" y="97" text-anchor="middle" font-size="7" font-family="sans-serif" fill="#4a0a6e">«derivedFrom»</text>

  <!-- e-fc-verify: FCFaultInjectionTest verifies FaultTolerantFCReq -->
  <line id="e-fc-verify" sysml:ref="Verification::FCFaultInjectionTest"
        x1="109" y1="318" x2="215" y2="220"
        stroke="#0a4a6e" stroke-width="1" stroke-dasharray="6 3"
        marker-end="url(#arrow-verify)"/>
  <text x="148" y="262" text-anchor="middle" font-size="7" font-family="sans-serif" fill="#0a4a6e">«verifies»</text>

  <!-- e-land-verify: SafeLandingTest verifies SafeLandingReq -->
  <line id="e-land-verify" sysml:ref="Verification::SafeLandingTest"
        x1="466" y1="294" x2="600" y2="195"
        stroke="#0a4a6e" stroke-width="1" stroke-dasharray="6 3"
        marker-end="url(#arrow-verify)"/>
  <text x="540" y="238" text-anchor="middle" font-size="7" font-family="sans-serif" fill="#0a4a6e">«verifies»</text>

  <!-- e-fc-alloc: FaultTolerantFCReq allocatedTo FlightController -->
  <line id="e-fc-alloc" sysml:ref="Allocations::RequirementAllocation"
        x1="281" y1="220" x2="370" y2="400"
        stroke="#4a3a00" stroke-width="1" stroke-dasharray="8 4"
        marker-end="url(#arrow-alloc)"/>
  <text x="315" y="316" text-anchor="middle" font-size="7" font-family="sans-serif" fill="#4a3a00">«allocatedTo»</text>

  <!-- e-land-alloc: SafeLandingReq allocatedTo UAVSystem -->
  <line id="e-land-alloc" sysml:ref="Allocations::RequirementAllocation"
        x1="645" y1="195" x2="667" y2="394"
        stroke="#4a3a00" stroke-width="1" stroke-dasharray="8 4"
        marker-end="url(#arrow-alloc)"/>
  <text x="668" y="300" font-size="7" font-family="sans-serif" fill="#4a3a00">«allocatedTo»</text>

</svg>
